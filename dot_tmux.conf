set -g extended-keys-format csi-u
set -s extended-keys on
set -g allow-passthrough on

##### PREFIX #####
unbind C-b
set -g prefix `
bind ` send-prefix

##### MISC #####
set -g default-shell /usr/bin/zsh
set -g repeat-time 0
set -g mouse on
set -g history-limit 50000
set -g detach-on-destroy off
set -g focus-events on
set -g set-clipboard on

# No bells — neither tmux's own nor any forwarded from programs
set -g bell-action none
set -g visual-bell off
setw -g monitor-bell off

##### VI MODE #####
set -g status-keys vi
setw -g mode-keys vi

##### NAVIGATION #####
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r = last-window

##### PANE / WINDOW MANAGEMENT #####
bind v split-window -h -c "#{pane_current_path}"
bind n split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

##### RESIZE PANES (ALT + hjkl) #####
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

##### CLIPBOARD #####
# Prefer wl-copy (Wayland), fall back to xclip (X11)
copy_cmd='if command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; fi'
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "$copy_cmd"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$copy_cmd"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "$copy_cmd"

##### STATUS BAR #####
set -g status-style fg=white,bg=black
set -g status-interval 60
set -g status-right "#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null)"
setw -g monitor-activity on

##### PANE APPEARANCE #####
set -g pane-border-lines single
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour240
set -g window-style 'fg=colour244,bg=default'
set -g window-active-style 'fg=colour255,bg=default'

##### BINDS #####
bind C-k clear-history
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

set-option -sa terminal-features ',*:clipboard,*:extkeys'
