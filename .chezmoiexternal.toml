# Managed external git repos — chezmoi clones/refreshes these on `apply`.
# This replaces the manual `git clone` steps for Oh My Zsh and its plugins.

[".oh-my-zsh"]
    type = "git-repo"
    url = "https://github.com/ohmyzsh/ohmyzsh.git"
    refreshPeriod = "168h"
    [".oh-my-zsh".clone]
        args = ["--depth=1"]
    [".oh-my-zsh".pull]
        args = ["--ff-only"]

[".oh-my-zsh/custom/plugins/zsh-autosuggestions"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-autosuggestions.git"
    refreshPeriod = "168h"
    [".oh-my-zsh/custom/plugins/zsh-autosuggestions".clone]
        args = ["--depth=1"]
    [".oh-my-zsh/custom/plugins/zsh-autosuggestions".pull]
        args = ["--ff-only"]

[".oh-my-zsh/custom/plugins/zsh-syntax-highlighting"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-syntax-highlighting.git"
    refreshPeriod = "168h"
    [".oh-my-zsh/custom/plugins/zsh-syntax-highlighting".clone]
        args = ["--depth=1"]
    [".oh-my-zsh/custom/plugins/zsh-syntax-highlighting".pull]
        args = ["--ff-only"]

[".oh-my-zsh/custom/plugins/zsh-completions"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-completions.git"
    refreshPeriod = "168h"
    [".oh-my-zsh/custom/plugins/zsh-completions".clone]
        args = ["--depth=1"]
    [".oh-my-zsh/custom/plugins/zsh-completions".pull]
        args = ["--ff-only"]

# JetBrainsMono Nerd Font — provides the Powerline/icon glyphs the agnoster
# prompt needs (without it, separators render as tofu boxes). Extracted into the
# user font dir; the run_onchange font-cache script picks it up. To update, bump
# the version in the URL *and* FONT_VERSION in the rebuild-font-cache script.
[".local/share/fonts/JetBrainsMonoNerdFont"]
    type = "archive"
    url = "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/JetBrainsMono.zip"
    refreshPeriod = "8760h"   # fonts rarely change; a version bump forces re-download anyway
    stripComponents = 0
    include = ["*.ttf"]       # keep only font files (drop LICENSE/README from the zip)
